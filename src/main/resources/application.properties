# Application
spring.application.name=jasper
server.port=8080

# ==================== MySQL DataSource ====================
spring.datasource.url=jdbc:mysql://localhost:3306/erp?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=abs@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==================== JPA / Hibernate ====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==================== File Upload ====================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ==================== Jasper Directories ====================
# Directory where uploaded JRXML templates are stored
jasper.templates.dir=uploads/templates
# Directory where generated PDFs are stored (temporary)
jasper.output.dir=uploads/output
